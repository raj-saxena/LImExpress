name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (unit only)
        run: go test -short -race ./...

  sqlc-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sqlc
        uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: "1.30.0"

      - name: Verify generated code is up to date
        run: |
          sqlc generate
          git diff --exit-code -- internal/db/

  templ-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify templ generated code is up to date
        run: |
          go run github.com/a-h/templ/cmd/templ@v0.3.1001 generate ./internal/portal/templates/
          git diff --exit-code -- internal/portal/templates/
